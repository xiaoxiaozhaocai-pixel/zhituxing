name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 必须在 setup-node 之前装 pnpm，否则 cache:'pnpm' 找不到可执行文件
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint || true  # 允许 lint 失败但要看到报告

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SITE_URL: https://fake.zeabur.app
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_ENABLED: "false"

# 注意：CodeQL job 已删除
# 原因：仓库是 private，CodeQL 需要付费的 GitHub Advanced Security
# 节点后路线：清理 4 处硬编码 service_role key → 轮转 Supabase key → 改 public → 重新启用 CodeQL
